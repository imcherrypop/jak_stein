<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jak_Stein — Roue des Perks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="blood-bar" aria-hidden="true"></div>

  <header class="channel">
    <h1 class="channel-name">Jak<span class="underscore">_</span>Stein</h1>
    <span class="channel-sub">Roue des Perks · Dead by Daylight</span>
  </header>

  <!-- Wheel -->
  <div class="wheel-wrap">
    <div class="pointer" aria-hidden="true">▼</div>
    <canvas id="wheelCanvas" width="600" height="600"
            role="button" tabindex="0"
            aria-label="Cliquer pour lancer la roue"></canvas>
    <button class="btn" id="spinBtn"><span>⚰ &nbsp;Lancer la Roue&nbsp; ⚰</span></button>
  </div>

  <!-- Result -->
  <div id="result" aria-live="polite">
    <span class="result-label" id="resultLabel" hidden>— Résultat —</span>
    <div class="res-entry-wrap" id="resEntryWrap">
      <span id="resultBadge" class="result-badge"></span>
      <span id="resultEntry" class="result-entry-name"></span>
    </div>
    <div class="result-arrow">↓</div>
    <span id="resultPerk" class="result-perk"></span>
  </div>

  <!-- Panel toggle -->
  <div class="panel-toggle-row">
    <button id="togglePanel" class="toggle-btn">▼ Gérer les tueurs</button>
    <span class="filter-count" id="activeCount"></span>
  </div>

  <!-- Checklist panel -->
  <div id="panelWrap" class="panel-wrap">
    <div id="checkPanel" class="check-panel"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
